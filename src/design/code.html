<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9f7; /* Matching Design System surface */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-between selection:bg-secondary-container">
<!-- Top Navigation Suppressed for Login focus journey -->
<main class="w-full max-w-md px-8 pt-24 pb-12 flex-grow flex flex-col">
<!-- Brand Identity Section -->
<header class="mb-20 text-center md:text-left">
<h1 class="text-4xl font-extrabold tracking-tighter text-primary">QOAT</h1>
<p class="mt-4 text-on-surface-variant font-medium leading-relaxed max-w-[280px] md:max-w-none">
                Quality Of All Things. Excellence curated for the modern minimalist.
            </p>
</header>
<!-- Login Form Section -->
<section class="flex-grow">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-wide text-primary/70 uppercase px-1" for="email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-[12px] p-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all duration-200" id="email" name="email" placeholder="hello@qoat.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="block text-sm font-semibold tracking-wide text-primary/70 uppercase" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-[12px] p-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Action Button -->
<div class="pt-8">
<button class="w-full bg-primary text-on-primary py-4 rounded-[12px] font-bold text-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-black/5" type="submit">
                        Sign In
                    </button>
</div>
</form>
</section>
<!-- Footer Navigation / Register Prompt -->
<footer class="mt-12 text-center pb-8">
<p class="text-on-surface-variant font-medium">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Register</a>
</p>
</footer>
</main>
<!-- Navigation Shell Suppressed: Following "Destination" Rule for Transactional pages -->
<!-- Decorative Image Card (Editorial Style) -->
<div class="hidden lg:fixed lg:right-12 lg:top-12 lg:bottom-12 lg:w-1/2 lg:flex items-center justify-center">
<div class="w-full h-full rounded-[32px] overflow-hidden bg-surface-container-low relative">
<img alt="Editorial Minimalist Aesthetic" class="w-full h-full object-cover grayscale opacity-40 mix-blend-multiply" data-alt="Minimalist architectural detail with sharp shadows on warm beige concrete walls, clean lines and extreme negative space editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9x5FhLzoJq3x2KDG8R_OSFtvvNOnRHc6Kae-rj7H_a3FdMotZZivuBgBDaQ59rYuPhfhJ1JTRnkpQgvCRB7AO8a2uCf8tAGTWwnQmYvYTVM2TfknDLQWxcmut2RajHV56wWZLLFNH0VZ_CI9byto32LokPsr8-tCowK1X283BP_SB1vmzEjD-2KX1wb8-zUtIF6uaT5NDhe9nfxk4KQe_HsjqACJ4ZuVLmYgaP93peby4tSZEZZlMHIWumJyA8LYKq2MIB4hYdGYW"/>
<div class="absolute inset-0 flex flex-col justify-end p-16 bg-gradient-to-t from-surface via-transparent to-transparent">
<div class="space-y-4">
<span class="inline-block px-3 py-1 bg-secondary-container text-on-secondary-container text-[10px] font-bold uppercase tracking-widest rounded-full">Editorial Issue 01</span>
<h2 class="text-5xl font-extrabold tracking-tight text-primary leading-tight">The Art of <br/>Curated Living.</h2>
</div>
</div>
</div>
</div>
</body></html>
